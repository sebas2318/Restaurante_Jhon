<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
    <h:head>
        <title>Restaurante Jhon - Gestión de Inventario</title>
        <style>
            body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
            .form-container { background: white; padding: 20px; border-radius: 8px; width: 400px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
            h2 { color: #333; }
            input { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
            .btn-submit { background-color: #007bff; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
            .btn-submit:hover { background-color: #0056b3; }
        </style>
    </h:head>
    <h:body>
        <div class="form-container">
            <h2>Agregar Nuevo Producto</h2>
            <form action="ProductoServlet" method="POST">
                <label>Nombre del Producto:</label>
                <input type="text" name="txtNombre" required="true" placeholder="Ej: Gaseosa 1.5L" />

                <label>Precio Unitario:</label>
                <input type="number" step="0.01" name="txtPrecio" required="true" placeholder="0.00" />

                <label>Cantidad en Stock:</label>
                <input type="number" name="txtStock" required="true" placeholder="Cantidad inicial" />

                <button type="submit" class="btn-submit">Registrar en Inventario</button>
            </form>
            <br/>
            <a href="registrarPedido.jsp">Ir a Módulo de Mesero</a>
            <a href="InventarioServlet">Ver inventario</a>
        </div>
    </h:body>
</html>
